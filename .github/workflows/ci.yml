name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate React Router types
        run: pnpm exec react-router typegen
        working-directory: apps/worker

      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run test

      - name: Validate D1 migrations are up to date with schema
        run: |
          pnpm --filter @spectrum-sweeps/db exec drizzle-kit generate
          git diff --exit-code --stat packages/db/migrations

      - name: Build worker
        run: pnpm run build
