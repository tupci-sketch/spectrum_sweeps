name: Deploy API (Cloudflare Worker)

# Applies D1 migrations and deploys the API-only Worker. Requires repo secrets
# CLOUDFLARE_API_TOKEN (D1 Edit + Workers Scripts Edit) and CLOUDFLARE_ACCOUNT_ID.
on:
  push:
    branches: [main]
    paths:
      - "apps/worker/server/**"
      - "apps/worker/workers/**"
      - "apps/worker/wrangler.jsonc"
      - "packages/db/**"
      - "packages/shared/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Apply D1 migrations
        run: pnpm exec wrangler d1 migrations apply spectrum-sweeps-db --remote
        working-directory: apps/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: pnpm exec wrangler deploy --env=""
        working-directory: apps/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
